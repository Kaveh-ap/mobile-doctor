<svg viewBox="0 0 760 258" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101a30" />
      <stop offset="100%" stop-color="#0b1120" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1" />
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="258" rx="20" fill="url(#bgGrad)" />

  <text x="380" y="28" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.5" fill="#94a3b8">🩺 MOBILE-DOCTOR — HOW IT FITS TOGETHER</text>

  <!-- CLI box -->
  <rect x="24" y="120" width="132" height="80" rx="16" fill="#131c31" stroke="#6366f1" stroke-width="1.5" />
  <text x="90" y="152" text-anchor="middle" font-size="22">🩺</text>
  <text x="90" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">mobile-doctor</text>
  <text x="90" y="189" text-anchor="middle" font-size="11" fill="#94a3b8">CLI</text>

  <!-- arrow CLI -> grid -->
  <line x1="160" y1="160" x2="206" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="183" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">adb</text>

  <!-- category chips -->
  <!-- row 1 -->
  <g>
    <rect x="210" y="106" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="228" y="134" font-size="16">🃏</text>
    <text x="252" y="133" font-size="12" fill="#e5e7eb">GFX</text>
  </g>
  <g>
    <rect x="338" y="106" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="356" y="134" font-size="16">🧠</text>
    <text x="380" y="133" font-size="12" fill="#e5e7eb">Memory</text>
  </g>
  <g>
    <rect x="466" y="106" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="484" y="134" font-size="16">🚀</text>
    <text x="508" y="133" font-size="12" fill="#e5e7eb">Startup</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="210" y="168" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="228" y="196" font-size="16">🖥️</text>
    <text x="252" y="195" font-size="12" fill="#e5e7eb">CPU</text>
  </g>
  <g>
    <rect x="338" y="168" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="356" y="196" font-size="16">🔋</text>
    <text x="380" y="195" font-size="12" fill="#e5e7eb">Battery</text>
  </g>
  <g>
    <rect x="466" y="168" width="110" height="46" rx="12" fill="#131c31" stroke="#334155" />
    <text x="484" y="196" font-size="16">🐒</text>
    <text x="508" y="195" font-size="12" fill="#e5e7eb">Stress</text>
  </g>

  <!-- arrow grid -> report -->
  <line x1="580" y1="160" x2="608" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="594" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">csv</text>

  <!-- report box -->
  <rect x="612" y="110" width="124" height="100" rx="16" fill="#131c31" stroke="url(#accentGrad)" stroke-width="1.5" />
  <text x="674" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#e5e7eb">report.html</text>

  <!-- mini navbar -->
  <rect x="624" y="140" width="26" height="12" rx="6" fill="url(#accentGrad)" />
  <rect x="654" y="140" width="26" height="12" rx="6" fill="none" stroke="#334155" />
  <rect x="684" y="140" width="26" height="12" rx="6" fill="none" stroke="#334155" />

  <!-- mini bar chart -->
  <rect x="628" y="178" width="10" height="20" rx="2" fill="#6366f1" opacity="0.85" />
  <rect x="644" y="168" width="10" height="30" rx="2" fill="#6366f1" opacity="0.85" />
  <rect x="660" y="184" width="10" height="14" rx="2" fill="#22d3ee" opacity="0.85" />
  <rect x="676" y="172" width="10" height="26" rx="2" fill="#22d3ee" opacity="0.85" />
  <rect x="692" y="180" width="10" height="18" rx="2" fill="#34d399" opacity="0.85" />

  <text x="674" y="232" text-anchor="middle" font-size="10" fill="#94a3b8">one navbar, every category</text>
</svg>
