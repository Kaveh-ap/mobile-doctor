<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Doctor — Stress Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #0b1120;
        --bg-soft: #0f172a;
        --card: #131c31;
        --card-border: rgba(148, 163, 184, 0.12);
        --text: #e5e7eb;
        --text-dim: #94a3b8;
        --accent-a: #6366f1;
        --accent-b: #22d3ee;
        --good: #34d399;
        --good-bg: rgba(52, 211, 153, 0.12);
        --bad: #f87171;
        --bad-bg: rgba(248, 113, 113, 0.12);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(circle at top, var(--bg-soft), var(--bg) 60%);
        color: var(--text);
        padding: 32px 24px 64px;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
      }

      .report-nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-bottom: 28px;
      }

      .report-nav-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid var(--card-border);
        background: var(--card);
        color: var(--text-dim);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        transition: border-color 0.15s, color 0.15s;
      }

      a.report-nav-pill:hover {
        border-color: var(--accent-b);
        color: var(--text);
      }

      .report-nav-pill.active {
        background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
        color: #0b1120;
        border-color: transparent;
      }

      .report-nav-pill.disabled {
        opacity: 0.4;
      }

      header.hero {
        text-align: center;
        margin-bottom: 32px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        background: var(--card);
        border: 1px solid var(--card-border);
        padding: 6px 14px;
        border-radius: 999px;
        margin-bottom: 18px;
      }

      h1.title {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        font-weight: 800;
        background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .hero p {
        margin: 0;
        color: var(--text-dim);
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
      }

      .legend-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 6px 14px 6px 10px;
        font-size: 0.85rem;
        color: var(--text);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 20px;
      }

      .stat-label {
        font-size: 0.9rem;
        color: var(--text);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      .stat-value {
        font-size: 1.7rem;
        font-weight: 700;
      }

      .stat-sub {
        color: var(--text-dim);
        font-size: 0.85rem;
        margin-top: 6px;
        line-height: 1.5;
      }

      .badge {
        display: inline-block;
        margin-top: 8px;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .badge.good {
        color: var(--good);
        background: var(--good-bg);
      }

      .badge.bad {
        color: var(--bad);
        background: var(--bad-bg);
      }

      .section-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 36px 0 16px;
        color: var(--text);
      }

      .charts {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .chart-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 20px;
      }

      .chart-card h3 {
        margin: 0 0 4px;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chart-card p.explain {
        margin: 0 0 14px;
        font-size: 0.85rem;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .chart-container {
        position: relative;
        height: 280px;
      }

      .table-card {
        margin-top: 16px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 20px;
        overflow-x: auto;
      }

      .table-card h3 {
        margin: 0 0 12px;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      th,
      td {
        text-align: left;
        padding: 12px 14px;
        border-bottom: 1px solid var(--card-border);
        white-space: nowrap;
      }

      td.reason {
        white-space: normal;
        max-width: 480px;
      }

      th {
        color: var(--text-dim);
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      tr:last-child td {
        border-bottom: none;
      }

      td.improvement {
        color: var(--good);
        font-weight: 700;
      }

      td.regression {
        color: var(--bad);
        font-weight: 700;
      }

      footer {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.8rem;
        margin-top: 40px;
      }

      .empty {
        text-align: center;
        color: var(--text-dim);
        padding: 60px 20px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav class="report-nav" id="reportNav"></nav>

      <header class="hero">
        <span class="eyebrow">🩺 mobile-doctor</span>
        <h1 class="title">Stress Test Report</h1>
        <p>Random-input fuzzing via <code>adb shell monkey</code>, compared across runs.</p>
        <div class="legend" id="legend"></div>
      </header>

      <div id="content"></div>

      <footer>Generated locally by mobile-doctor — no data leaves your machine except the Chart.js CDN load.</footer>
    </div>

    <script>
      // --- NAV ---
      // Populated by src/report/index.js: one entry per category, linking
      // to its most recently generated report (relative to this file) so
      // you can jump between gfx/memory/cpu/... without reopening the CLI.
      // Frozen at generation time — regenerate a report to refresh its
      // links to whatever's newest in other categories.
      const navLinks = [];
      const navEl = document.getElementById('reportNav');
      if (navEl) {
        navEl.innerHTML = navLinks
          .map((n) => {
            if (!n.href) {
              return `<span class="report-nav-pill disabled">${n.icon} ${n.label}</span>`;
            }
            return `<a class="report-nav-pill${n.active ? ' active' : ''}" href="${n.href}">${n.icon} ${n.label}</a>`;
          })
          .join('');
      }

      // --- DATA ---
      // Populated by src/report/index.js: one { name, csv } entry per
      // selected run, named after its run folder. Each row here is one
      // monkey session, not an "iteration" of a continuous metric — pass/
      // fail summaries make more sense than a trend line for this category.
      const datasets = [];

      function parseCSV(csv) {
        const lines = csv.trim().split('\n');
        if (lines.length < 2) return [];
        const headers = lines[0].split(',');
        return lines.slice(1).map((line) => {
          const values = line.split(',');
          const obj = {};
          headers.forEach((h, i) => {
            obj[h] = isNaN(values[i]) ? values[i] : Number(values[i]);
          });
          return obj;
        });
      }

      const COLORS = [
        { r: 99, g: 102, b: 241 }, // indigo
        { r: 52, g: 211, b: 153 }, // emerald
        { r: 251, g: 191, b: 36 }, // amber
        { r: 244, g: 114, b: 182 }, // pink
        { r: 34, g: 211, b: 238 }, // cyan
        { r: 167, g: 139, b: 250 }, // violet
      ];
      const rgba = (c, a) => `rgba(${c.r}, ${c.g}, ${c.b}, ${a})`;

      const series = datasets
        .map((d, i) => ({
          name: d.name,
          color: COLORS[i % COLORS.length],
          data: parseCSV(d.csv),
        }))
        .filter((s) => s.data.length > 0);

      const contentEl = document.getElementById('content');
      const legendEl = document.getElementById('legend');

      if (series.length === 0) {
        contentEl.innerHTML = '<p class="empty">No data to display.</p>';
      } else {
        legendEl.innerHTML = series
          .map((s) => `<span class="legend-pill"><span class="dot" style="background:${rgba(s.color, 1)}"></span>${s.name}</span>`)
          .join('');

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.12)';
        Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";

        // --- PER-RUN AGGREGATION ---
        const summaries = series.map((s) => {
          const total = s.data.length;
          const crashed = s.data.filter((d) => d['Crashed'] === 'yes').length;
          const anr = s.data.filter((d) => d['ANR'] === 'yes').length;
          const totalInjected = s.data.reduce((sum, d) => sum + (Number(d['Events Injected']) || 0), 0);
          const totalRequested = s.data.reduce((sum, d) => sum + (Number(d['Requested Events']) || 0), 0);
          const completionPct = totalRequested ? (totalInjected / totalRequested) * 100 : null;
          return {
            name: s.name,
            color: s.color,
            total,
            crashed,
            anr,
            crashRate: total ? (crashed / total) * 100 : 0,
            anrRate: total ? (anr / total) * 100 : 0,
            completionPct,
          };
        });

        // --- SUMMARY STAT CARDS (one per run) ---
        const statsHtml = summaries
          .map((r) => {
            const clean = r.crashed === 0 && r.anr === 0;
            const badge = clean
              ? '<span class="badge good">no crashes/ANRs</span>'
              : `<span class="badge bad">${r.crashed} crash${r.crashed === 1 ? '' : 'es'}, ${r.anr} ANR${r.anr === 1 ? '' : 's'}</span>`;
            return `
              <div class="stat-card">
                <div class="stat-label"><span class="dot" style="background:${rgba(r.color, 1)}"></span>${r.name}</div>
                <div class="stat-value">${r.crashRate.toFixed(1)}% crash rate</div>
                <div class="stat-sub">${r.crashed}/${r.total} sessions crashed · ${r.anr}/${r.total} ANR'd${
              r.completionPct !== null ? ` · ${r.completionPct.toFixed(0)}% events completed on avg` : ''
            }</div>
                ${badge}
              </div>
            `;
          })
          .join('');

        // --- CHART: crash/ANR/completion rate per run ---
        const barLabels = ['Crash rate %', 'ANR rate %', 'Avg event completion %'];

        // --- PER-RUN SESSION TABLES ---
        const sessionTables = series
          .map((s, i) => {
            const rows = s.data
              .map((d, idx) => {
                const crashedYes = d['Crashed'] === 'yes';
                const anrYes = d['ANR'] === 'yes';
                return `
                  <tr>
                    <td>${idx + 1}</td>
                    <td>${d['Events Injected']}/${d['Requested Events']}</td>
                    <td class="${crashedYes ? 'regression' : ''}">${d['Crashed']}</td>
                    <td class="${anrYes ? 'regression' : ''}">${d['ANR']}</td>
                    <td class="reason">${d['Failure Reason'] || '—'}</td>
                  </tr>
                `;
              })
              .join('');
            return `
              <div class="table-card">
                <h3><span class="dot" style="background:${rgba(summaries[i].color, 1)}"></span>${s.name}</h3>
                <table>
                  <thead><tr><th>Session</th><th>Events</th><th>Crashed</th><th>ANR</th><th>Failure reason</th></tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            `;
          })
          .join('');

        contentEl.innerHTML = `
          <div class="stats">${statsHtml}</div>

          <div class="section-title">Reliability across runs</div>
          <div class="charts">
            <div class="chart-card">
              <h3>📊 Crash / ANR rate &amp; event completion</h3>
              <p class="explain">Lower crash/ANR rate and higher event completion both mean the app held up better under random input fuzzing.</p>
              <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
          </div>

          <div class="section-title">Session-by-session detail</div>
          ${sessionTables}
        `;

        new Chart(document.getElementById('barChart'), {
          type: 'bar',
          data: {
            labels: barLabels,
            datasets: summaries.map((r) => ({
              label: r.name,
              data: [r.crashRate, r.anrRate, r.completionPct ?? 0],
              backgroundColor: rgba(r.color, 0.75),
              borderRadius: 6,
            })),
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: { y: { beginAtZero: true, max: 100 } },
          },
        });
      }
    </script>
  </body>
</html>
